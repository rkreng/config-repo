server:
  port: 8081

spring:
  application:
    name: microservice-order

  datasource:
    url: jdbc:mysql://localhost:3306/orders
    username: root
    password: secret

  kafka:
    bootstrap-servers: localhost:9092
    topic: order-events

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
